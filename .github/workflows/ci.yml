name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Generate OpenAPI types
        run: npm run api:generate

      - name: Verify OpenAPI required responses
        run: npm run api:verify

      - name: Contract suite
        run: npm run test:contracts

      - name: Smoke suite
        run: npm run test:smoke

      - name: Check import boundaries
        run: npm run check:boundaries

      - name: Generate code map docs
        run: npm run docs:code-map

      - name: Check docs
        run: npm run docs:check
